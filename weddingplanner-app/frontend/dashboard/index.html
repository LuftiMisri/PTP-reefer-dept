<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ever After — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { display: ['Playfair Display', 'serif'], sans: ['Inter', 'sans-serif'] },
          colors: {
            blush: { 50: '#fdf2f4', 100: '#fbe6ea', 200: '#f6c9d3', 300: '#efa3b3' },
            gold: { 400: '#d9a857', 500: '#c8943f', 600: '#a87530' },
          },
        },
      },
    };
  </script>
  <script src="/shared/app.js"></script>
</head>
<body class="font-sans bg-blush-50 text-gray-800 min-h-screen flex flex-col">

  <header class="border-b border-blush-200 bg-white/80 backdrop-blur sticky top-0 z-30">
    <nav class="flex items-center justify-between px-4 sm:px-6 py-3">
      <div class="flex items-center gap-3">
        <button id="sidebar-toggle" class="p-2 rounded-md hover:bg-blush-100 text-gray-600" aria-label="Toggle categories">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
        <a href="/dashboard/" class="flex items-center gap-2">
          <span class="text-2xl">💍</span>
          <span class="font-display text-xl font-700 text-gray-900">Ever After</span>
        </a>
      </div>
      <div class="flex items-center gap-3">
        <button id="music-toggle" class="p-2 rounded-md hover:bg-blush-100 text-lg" title="Play background music">🔇</button>
        <button id="logout-btn" class="text-sm font-semibold text-gray-600 hover:text-gold-600">Log Out</button>
      </div>
    </nav>
  </header>

  <audio id="bg-music" src="/shared/audio/bergema-selamanya.mp3" preload="none"></audio>

  <div class="flex-1 flex relative">

    <!-- Backdrop for mobile when sidebar is open -->
    <div id="sidebar-backdrop" class="hidden fixed inset-0 bg-black/30 z-20"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed sm:static top-[57px] sm:top-0 left-0 h-[calc(100vh-57px)] sm:h-auto bg-white border-r border-blush-200 z-20 overflow-y-auto flex-shrink-0 transition-all duration-200 -translate-x-full w-64">
      <p class="px-4 pt-4 pb-2 text-xs uppercase tracking-wide text-gray-400">Categories</p>
      <nav id="sidebar-categories" class="px-2 pb-4 space-y-1"></nav>
    </aside>

    <main class="flex-1 w-full px-4 sm:px-6 py-10 max-w-5xl mx-auto">

      <!-- Countdown + couple names -->
      <div class="text-center mb-10">
        <p id="couple-names" class="font-display text-2xl font-700 text-gray-900"></p>
        <p id="countdown" class="text-gold-600 font-semibold mt-1"></p>
      </div>

      <p id="dashboard-loading" class="hidden text-sm text-gray-400 text-center mb-4">Loading dashboard…</p>

      <div id="dashboard-empty" class="hidden bg-white border border-blush-200 rounded-xl p-8 text-center mb-10">
        <p class="font-display text-lg text-gray-900 mb-1">No budget data yet</p>
        <p class="text-sm text-gray-500">Add a category and some budget items to see your dashboard come to life.</p>
      </div>

      <!-- Aggregate totals -->
      <div id="totals-grid" class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
        <div class="bg-white border border-blush-200 rounded-xl p-4 text-center hover:shadow-sm transition-shadow">
          <p class="text-xs uppercase tracking-wide text-gray-400">Budget</p>
          <p id="total-budget" class="font-display text-lg font-700 text-gray-900 mt-1"></p>
        </div>
        <div class="bg-white border border-blush-200 rounded-xl p-4 text-center hover:shadow-sm transition-shadow">
          <p class="text-xs uppercase tracking-wide text-gray-400">Actual</p>
          <p id="total-actual" class="font-display text-lg font-700 text-gray-900 mt-1"></p>
        </div>
        <div class="bg-white border border-blush-200 rounded-xl p-4 text-center hover:shadow-sm transition-shadow">
          <p class="text-xs uppercase tracking-wide text-gray-400">Paid</p>
          <p id="total-paid" class="font-display text-lg font-700 text-green-700 mt-1"></p>
        </div>
        <div class="bg-white border border-blush-200 rounded-xl p-4 text-center hover:shadow-sm transition-shadow">
          <p class="text-xs uppercase tracking-wide text-gray-400">Pending</p>
          <p id="total-pending" class="font-display text-lg font-700 text-gold-600 mt-1"></p>
        </div>
      </div>

      <!-- Charts -->
      <div id="charts-grid" class="grid lg:grid-cols-2 gap-6 mb-10">
        <div class="bg-white border border-blush-200 rounded-xl p-4 hover:shadow-sm transition-shadow">
          <h3 class="font-display text-base font-700 text-gray-900 mb-3">Overall Budget Breakdown</h3>
          <div class="relative" style="height: 240px;">
            <canvas id="overall-chart"></canvas>
          </div>
        </div>
        <div class="bg-white border border-blush-200 rounded-xl p-4 hover:shadow-sm transition-shadow">
          <h3 class="font-display text-base font-700 text-gray-900 mb-3">Paid vs Pending by Category</h3>
          <div class="relative">
            <canvas id="category-chart"></canvas>
          </div>
        </div>
      </div>

    </main>
  </div>

  <script>
    const sidebar = document.getElementById('sidebar');
    const sidebarToggle = document.getElementById('sidebar-toggle');
    const sidebarBackdrop = document.getElementById('sidebar-backdrop');

    function isDesktop() {
      return window.matchMedia('(min-width: 640px)').matches;
    }

    function setSidebarOpen(open) {
      if (isDesktop()) {
        sidebar.classList.remove('-translate-x-full', 'translate-x-0', 'w-64', 'w-0');
        sidebar.classList.add(open ? 'w-64' : 'w-0');
        sidebar.style.overflow = open ? 'auto' : 'hidden';
        sidebarBackdrop.classList.add('hidden');
      } else {
        sidebar.classList.remove('w-0');
        sidebar.classList.add('w-64');
        sidebar.style.overflow = 'auto';
        sidebar.classList.toggle('-translate-x-full', !open);
        sidebar.classList.toggle('translate-x-0', open);
        sidebarBackdrop.classList.toggle('hidden', !open);
      }
    }

    window.addEventListener('resize', () => setSidebarOpen(sidebarOpen));

    let sidebarOpen = isDesktop();
    setSidebarOpen(sidebarOpen);

    sidebarToggle.addEventListener('click', () => {
      sidebarOpen = !sidebarOpen;
      setSidebarOpen(sidebarOpen);
    });
    sidebarBackdrop.addEventListener('click', () => {
      sidebarOpen = false;
      setSidebarOpen(sidebarOpen);
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await apiFetch('/api/auth/logout', { method: 'POST' });
      window.location.href = '/auth/';
    });

    function renderCountdown(days) {
      if (days == null) return 'Set your wedding date to start the countdown.';
      if (days > 0) return `${days} day${days === 1 ? '' : 's'} to go!`;
      if (days === 0) return "It's today! 🎉";
      return 'Congratulations on your wedding! 🎉';
    }

    function renderSidebar(categories) {
      const nav = document.getElementById('sidebar-categories');
      nav.innerHTML = '';
      categories.forEach((cat) => {
        const a = document.createElement('a');
        a.href = `/category/?id=${cat.id}`;
        a.className = 'block px-3 py-2 rounded-md text-sm font-medium text-gray-600 hover:bg-blush-100 hover:text-gray-900 transition';
        a.textContent = cat.name;
        nav.appendChild(a);
      });
    }

    function renderOverallChart(totals) {
      new Chart(document.getElementById('overall-chart'), {
        type: 'bar',
        data: {
          labels: ['Budget', 'Actual', 'Paid', 'Pending'],
          datasets: [{
            data: [totals.budget, totals.actual, totals.paid, totals.pending],
            backgroundColor: ['#c8943f', '#a87530', '#15803d', '#efa3b3'],
            borderRadius: 6,
          }],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, ticks: { callback: (v) => formatRM(v) } },
            x: { ticks: { maxRotation: 0, minRotation: 0, autoSkip: false } },
          },
        },
      });
    }

    function renderCategoryChart(categories) {
      const withSpend = categories.filter((c) => Number(c.budget_total) > 0);
      const height = Math.max(220, withSpend.length * 36);
      const canvas = document.getElementById('category-chart');
      canvas.parentElement.style.height = height + 'px';

      new Chart(canvas, {
        type: 'bar',
        data: {
          labels: withSpend.map((c) => c.name),
          datasets: [
            { label: 'Paid', data: withSpend.map((c) => Number(c.paid_total)), backgroundColor: '#15803d', borderRadius: 4 },
            { label: 'Pending', data: withSpend.map((c) => Number(c.pending_total)), backgroundColor: '#efa3b3', borderRadius: 4 },
          ],
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            x: { stacked: true, ticks: { callback: (v) => formatRM(v) } },
            y: { stacked: true },
          },
          plugins: { legend: { position: 'bottom' } },
        },
      });
    }

    async function loadDashboard() {
      setLoading('dashboard-loading', true);
      const dashboard = await apiFetch('/api/dashboard');
      setLoading('dashboard-loading', false);
      if (!dashboard) return;

      const names = [dashboard.partnerName1, dashboard.partnerName2].filter(Boolean).join(' & ');
      document.getElementById('couple-names').textContent = names || 'Your Wedding';
      document.getElementById('countdown').textContent = renderCountdown(dashboard.daysUntilWedding);

      renderSidebar(dashboard.categories);

      const isEmpty = dashboard.categories.length === 0;
      document.getElementById('dashboard-empty').classList.toggle('hidden', !isEmpty);
      document.getElementById('totals-grid').classList.toggle('hidden', isEmpty);
      document.getElementById('charts-grid').classList.toggle('hidden', isEmpty);
      if (isEmpty) return;

      document.getElementById('total-budget').textContent = formatRM(dashboard.totals.budget);
      document.getElementById('total-actual').textContent = formatRM(dashboard.totals.actual);
      document.getElementById('total-paid').textContent = formatRM(dashboard.totals.paid);
      document.getElementById('total-pending').textContent = formatRM(dashboard.totals.pending);

      renderOverallChart(dashboard.totals);
      renderCategoryChart(dashboard.categories);
    }

    loadDashboard();
    initMusicToggle('music-toggle', 'bg-music');
  </script>

</body>
</html>
